server:
  port: 9005
spring:
  application:
    name: agent-agent
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery: { server-addr: localhost:8848 }
      config:   { server-addr: localhost:8848, file-extension: yaml }
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/agent_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j (Swagger UI)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 实体类列表

# Actuator (健康检查 / 指标暴露)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Seata 分布式事务
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: agent-platform-tx-group
  registry:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: SEATA_GROUP
      namespace: ""
      username: nacos
      password: nacos
  config:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: SEATA_GROUP
      namespace: ""
      dataId: seataServer.properties
  service:
    vgroup-mapping:
      agent-platform-tx-group: default
    disable-global-transaction: false

# Feign 客户端降级
feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
        loggerLevel: basic

# 多智能体 / 工具调用
agent:
  default-model-id: 1
  tools:
    base-url: http://localhost:9008
    timeout-ms: 30000
  reflection:
    enabled: false
    threshold: 7.0
  multi-agent:
    max-rounds: 5
    supervisor:
      max-steps: 8
    group-chat:
      max-rounds: 5
