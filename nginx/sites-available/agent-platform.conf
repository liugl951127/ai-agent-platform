# =============================================================================
# AI Agent Platform — 单域名配置
# =============================================================================
# 用法:
#   1. cp agent-platform.conf /etc/nginx/sites-available/
#   2. ln -s /etc/nginx/sites-available/agent-platform.conf /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
# =============================================================================

# ---------- HTTP: 跳 HTTPS ----------
server {
    listen      80;
    listen      [::]:80;
    server_name ai.your-domain.com;

    # 健康检查端点 (给 K8s/负载均衡用)
    location = /healthz { access_log off; return 200 "ok\n"; }

    # Let's Encrypt 验证路径 (Certbot 会用到, 不要改)
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # 其余 HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS 主站 ----------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name ai.your-domain.com;

    # SSL 证书 (用 certbot 申请, 或自有)
    ssl_certificate     /etc/nginx/ssl/ai.your-domain.com.crt;
    ssl_certificate_key /etc/nginx/ssl/ai.your-domain.com.key;
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;   # openssl dhparam -out dhparam.pem 2048

    # SSL 优化
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     1d;
    ssl_session_tickets     off;
    ssl_stapling            on;
    ssl_stapling_verify     on;

    # 根目录: 前端 dist
    root         /opt/agent-ui/dist;
    index        index.html;
    charset      utf-8;

    # 安全头
    add_header X-Frame-Options            "SAMEORIGIN"          always;
    add_header X-Content-Type-Options     "nosniff"             always;
    add_header X-XSS-Protection           "1; mode=block"       always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy    "default-src 'self' http: https: data: blob: 'unsafe-inline'"  always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"  always;

    # 客户端最大请求 (LLM 上传文档)
    client_max_body_size 100m;

    # ---------- 前端 SPA (Vue Router history 模式) ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存 (Vue/Vite 构建的带 hash 资源)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html 永远不缓存 (热更新)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # ---------- 后端 API 反代 ----------
    # 所有 /api/* 走 gateway (9000), 由 gateway 路由到具体服务
    location /api/ {
        proxy_pass         http://agent_gateway/;
        proxy_http_version 1.1;

        # WebSocket & SSE 必须
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 超时
        proxy_connect_timeout  10s;
        proxy_send_timeout     120s;   # SSE 长连接
        proxy_read_timeout     120s;

        # 缓冲关掉 (流式 / SSE 必须)
        proxy_buffering        off;
        proxy_request_buffering off;
        proxy_cache            off;

        # 压缩 (流式自动跳过)
        gzip off;
    }

    # ---------- 限流: /agent/chat (LLM 调用, 慢) ----------
    location /api/agent/chat {
        limit_req zone=req_per_ip burst=10 nodelay;
        limit_conn conn_per_ip 5;
        proxy_pass http://agent_gateway/agent/chat;
        # 复用上面 header/timeout, 简化
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;  # LLM 可能慢
    }

    # ---------- 直连: actuator (健康检查) ----------
    # 限内网访问, 防信息泄露
    location ~ ^/api/.*/actuator/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass http://agent_gateway;
    }

    # ---------- 错误页 ----------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
