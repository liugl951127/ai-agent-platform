# =============================================================================
# AI Agent Platform — 多服务独立暴露 (内网 / K8s 用)
# =============================================================================
# 不用 gateway, 每个服务独立子域名. 适合内网或 K8s service mesh
#
# 域名前缀:
#   api.your-domain.com    → agent-gateway
#   auth.xxx               → agent-auth
#   llm.xxx                → agent-llm
#   tools.xxx              → agent-tools
#   ... 等等
# =============================================================================

# 公共设置
map $http_x_forwarded_proto $orig_scheme {
    default $scheme;
    https   https;
    http    http;
}

# HTTP 跳 HTTPS
server {
    listen 80;
    server_name *.agent.local ai.agent.local;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# 默认: 全部 7 个子域走同一个证书 (通配符 *.agent.local)
server {
    listen 443 ssl http2;
    server_name *.agent.local;

    ssl_certificate     /etc/nginx/ssl/_.agent.local.crt;
    ssl_certificate_key /etc/nginx/ssl/_.agent.local.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 100m;

    # 通用 header + 反代
    proxy_http_version 1.1;
    proxy_set_header Upgrade         $http_upgrade;
    proxy_set_header Connection      $connection_upgrade;
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $orig_scheme;
    proxy_buffering off;
    proxy_cache off;

    # 子域路由
    location / {
        # gateway 默认
        proxy_pass http://agent_gateway;
    }
}

# auth 服务
server {
    listen 443 ssl http2;
    server_name auth.agent.local;
    ssl_certificate     /etc/nginx/ssl/_.agent.local.crt;
    ssl_certificate_key /etc/nginx/ssl/_.agent.local.key;
    client_max_body_size 20m;
    location / {
        proxy_pass http://agent_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# llm 服务
server {
    listen 443 ssl http2;
    server_name llm.agent.local;
    ssl_certificate     /etc/nginx/ssl/_.agent.local.crt;
    ssl_certificate_key /etc/nginx/ssl/_.agent.local.key;
    client_max_body_size 100m;
    location / {
        proxy_pass http://agent_llm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # LLM 流式长连接
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

# tools 服务
server {
    listen 443 ssl http2;
    server_name tools.agent.local;
    ssl_certificate     /etc/nginx/ssl/_.agent.local.crt;
    ssl_certificate_key /etc/nginx/ssl/_.agent.local.key;
    client_max_body_size 50m;
    location / {
        proxy_pass http://agent_tools;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# workflow / knowledge / agent / system / conversation
# 同样模板, 各自一个 server {} 块
# 这里只示例 workflow, 其他照搬即可
server {
    listen 443 ssl http2;
    server_name workflow.agent.local;
    ssl_certificate     /etc/nginx/ssl/_.agent.local.crt;
    ssl_certificate_key /etc/nginx/ssl/_.agent.local.key;
    location / { proxy_pass http://agent_workflow; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}

# connection_upgrade map (WebSocket 必须)
# 放在 http {} 块里:
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
