# =============================================================================
# AI Agent Platform — Nginx 主配置
# =============================================================================
# 用法:
#   1. cp nginx.conf /etc/nginx/nginx.conf
#   2. 把 sites/ 整个目录 copy 到 /etc/nginx/sites-enabled/
#   3. nginx -t  # 测配置
#   4. systemctl reload nginx
#
# 也可放到 /etc/nginx/conf.d/agent-platform.conf, 用 include 引入
# =============================================================================

user                 www-data;
worker_processes     auto;
worker_rlimit_nofile 65535;
pid                 /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    # ---------- 基础 ----------
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    charset             utf-8;
    server_tokens       off;    # 隐藏版本号

    # 日志格式 (含响应时间, upstream addr)
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format  json  escape=json
                      '{"time":"$time_iso8601",'
                      '"remote_addr":"$remote_addr",'
                      '"request":"$request",'
                      '"status":$status,'
                      '"bytes":$body_bytes_sent,'
                      '"referer":"$http_referer",'
                      '"ua":"$http_user_agent",'
                      '"rt":$request_time,'
                      '"upstream":"$upstream_addr"}';

    access_log          /var/log/nginx/access.log main;
    error_log           /var/log/nginx/error.log warn;

    # ---------- 性能 ----------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;

    # 请求体大小 (LLM 上传文档/图片用)
    client_max_body_size 100m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # 超时
    client_body_timeout   60s;
    client_header_timeout 60s;
    send_timeout          120s;
    keepalive_requests    1000;

    # 压缩
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ---------- 安全 ----------
    # 限流区: 用 limit_req_zone 在 server {} 里定义
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_req_zone  $binary_remote_addr zone=req_per_ip:10m rate=30r/s;

    # 隐藏 server 信息 (用 nginx-extras 才能用 more_clear_headers, 这里用普通方法)
    # 需装: apt install libnginx-mod-http-headers-more-filter
    # more_clear_headers Server;
    # more_clear_headers X-Powered-By;

    # upstream 池: Spring Boot 微服务
    upstream agent_gateway    { server 127.0.0.1:9000; keepalive 32; }
    upstream agent_auth       { server 127.0.0.1:9001; keepalive 16; }
    upstream agent_llm        { server 127.0.0.1:9002; keepalive 16; }
    upstream agent_workflow   { server 127.0.0.1:9003; keepalive 16; }
    upstream agent_knowledge  { server 127.0.0.1:9004; keepalive 16; }
    upstream agent_agent      { server 127.0.0.1:9005; keepalive 16; }
    upstream agent_conversation { server 127.0.0.1:9006; keepalive 16; }
    upstream agent_system     { server 127.0.0.1:9007; keepalive 16; }
    upstream agent_tools      { server 127.0.0.1:9008; keepalive 16; }

    # 包含站点配置
    include /etc/nginx/sites-enabled/*;
    # 或者: include /etc/nginx/conf.d/*.conf;
}
