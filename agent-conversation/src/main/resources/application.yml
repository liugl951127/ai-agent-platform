server:
  port: 9006
spring:
  application:
    name: agent-conversation
  cloud:
    nacos:
      discovery: { server-addr: localhost:8848 }
      config:   { server-addr: localhost:8848, file-extension: yaml }
  datasource:
    url: jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

# Knife4j (Swagger UI)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 实体类列表

# Actuator (健康检查 / 指标暴露)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Seata 分布式事务
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: agent-platform-tx-group
  registry:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: SEATA_GROUP
      namespace: ""
      username: nacos
      password: nacos
  config:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: SEATA_GROUP
      namespace: ""
      dataId: seataServer.properties
  service:
    vgroup-mapping:
      agent-platform-tx-group: default
    disable-global-transaction: false
