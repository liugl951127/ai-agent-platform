server:
  port: 9006
spring:
  application:
    name: agent-conversation
  cloud:
    nacos:
      # 默认关闭 Nacos, 启动时不依赖. 需要时把 enabled: true 或传 --spring.cloud.nacos.discovery.enabled=true

      discovery: { server-addr: localhost:8848, enabled: false }
      config:   { server-addr: localhost:8848, file-extension: yaml, enabled: false }
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/agent_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

# Knife4j (Swagger UI)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 实体类列表

# Actuator (健康检查 / 指标暴露)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Seata 分布式事务
seata:
  enabled: false
  enabled: false