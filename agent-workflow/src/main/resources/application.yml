server:
  port: 9003
spring:
  application:
    name: agent-workflow
  cloud:
    nacos:
      discovery: { server-addr: localhost:8848 }
      config:   { server-addr: localhost:8848, file-extension: yaml }
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/agent_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
flowable:
  database-schema-update: true
  async-executor-activate: true

# Knife4j (Swagger UI)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 实体类列表

# Actuator (健康检查 / 指标暴露)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
