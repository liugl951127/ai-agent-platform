name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths: [ 'agent-ui/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'agent-ui/**' ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent-ui/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: agent-ui-dist
          path: agent-ui/dist
          retention-days: 7
